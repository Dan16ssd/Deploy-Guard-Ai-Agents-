name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tooling
        # Lightweight set sufficient for lint + the dependency-light test suite.
        # (Full agent/runtime deps live in requirements.txt and are exercised at runtime.)
        run: pip install ruff black pytest pytest-asyncio pydantic pyyaml

      - name: Ruff (lint)
        run: ruff check .

      - name: Black (format check)
        run: black --check .

      - name: Pytest
        run: pytest -q
