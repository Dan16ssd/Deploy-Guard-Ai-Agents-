name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -q
        env:
          FEATHERLESS_BASE_URL: https://api.featherless.ai/v1
          FEATHERLESS_API_KEY: ${{ secrets.FEATHERLESS_API_KEY }}
          SCAN_AGENT_ID: ${{ secrets.SCAN_AGENT_ID }}
          SCAN_AGENT_API_KEY: ${{ secrets.SCAN_AGENT_API_KEY }}
          SECURITY_AGENT_ID: ${{ secrets.SECURITY_AGENT_ID }}
          SECURITY_AGENT_API_KEY: ${{ secrets.SECURITY_AGENT_API_KEY }}
          RISK_AGENT_ID: ${{ secrets.RISK_AGENT_ID }}
          RISK_AGENT_API_KEY: ${{ secrets.RISK_AGENT_API_KEY }}
          DEPLOY_AGENT_ID: ${{ secrets.DEPLOY_AGENT_ID }}
          DEPLOY_AGENT_API_KEY: ${{ secrets.DEPLOY_AGENT_API_KEY }}
          REPORT_AGENT_ID: ${{ secrets.REPORT_AGENT_ID }}
          REPORT_AGENT_API_KEY: ${{ secrets.REPORT_AGENT_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          TARGET_REPO: ${{ secrets.TARGET_REPO }}
          GITHUB_WEBHOOK_SECRET: ${{ secrets.GITHUB_WEBHOOK_SECRET }}
          BAND_SERVICE_API_KEY: ${{ secrets.BAND_SERVICE_API_KEY }}
          BAND_REST_URL: https://api.band.ai

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

      - name: Trigger Railway redeploy
        run: |
          curl -X POST "${{ secrets.RAILWAY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"ref": "main"}'

      - name: Health check
        run: |
          sleep 15
          curl -f "${{ secrets.RAILWAY_APP_URL }}/health"
